    <style>
      body { margin: 0; background: #1e1e1e; }
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: #1e1e1e;
        transition: opacity 0.3s;
      }
      #loader.fade-out { opacity: 0; pointer-events: none; }
      #loader svg { width: 128px; height: 128px; opacity: 0.4; }
      #loader .bar {
        position: absolute;
        bottom: 50%;
        left: 50%;
        transform: translate(-50%, 40px);
        width: 100px;
        height: 2px;
        background: rgba(255,255,255,0.08);
        border-radius: 1px;
        overflow: hidden;
      }
      #loader .bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: rgba(255,255,255,0.25);
        border-radius: 1px;
        animation: slide 1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
